name: "Experimental Release"
concurrency: release
on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/release.yml'
      - 'android/**'
      - 'build-data/**'
      - 'build-scripts/generate-release-notes.js'
      - 'cataclysm-launcher'
      - 'data/**'
      - 'doc/**'
      - 'gfx/**'
      - 'lang/po/*.po'
      - 'LICENSE*'
      - 'Makefile'
      - 'README*'
      - 'src/**'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPOSITORY_NAME: ${{ github.event.repository.name }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      timestamp: ${{ steps.get-timestamp.outputs.time }}
    steps:
      - name: Get build timestamp
        id: get-timestamp
        run: |
          echo "time=$(/bin/date -u "+%Y-%m-%d-%H%M")" >> $GITHUB_OUTPUT
      - name: Generate environmental variables
        id: generate_env_vars
        run: |
          echo "tag_name=cdda-experimental-${STEPS_GET_TIMESTAMP_OUTPUTS_TIME}" >> $GITHUB_OUTPUT
          echo "release_name=Cataclysm-DDA experimental build ${STEPS_GET_TIMESTAMP_OUTPUTS_TIME}" >> $GITHUB_OUTPUT
        env:
          STEPS_GET_TIMESTAMP_OUTPUTS_TIME: ${{ steps.get-timestamp.outputs.time }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Generate Release Notes
        id: generate-release-notes
        run: |
          npm install @actions/github@8
          node build-scripts/generate-release-notes.js '${{ secrets.GITHUB_TOKEN }}' "${STEPS_GENERATE_ENV_VARS_OUTPUTS_TAG_NAME}" "$(git log -1 --format='%H')" > notes.txt
        env:
          STEPS_GENERATE_ENV_VARS_OUTPUTS_TAG_NAME: ${{ steps.generate_env_vars.outputs.tag_name }}
      - run: |
          gh release create ${STEPS_GENERATE_ENV_VARS_OUTPUTS_TAG_NAME} --notes-file notes.txt --prerelease --title "${STEPS_GENERATE_ENV_VARS_OUTPUTS_RELEASE_NAME}" --target "$(git log -1 --format='%H')"
        env:
          STEPS_GENERATE_ENV_VARS_OUTPUTS_TAG_NAME: ${{ steps.generate_env_vars.outputs.tag_name }}
          STEPS_GENERATE_ENV_VARS_OUTPUTS_RELEASE_NAME: ${{ steps.generate_env_vars.outputs.release_name }}

  compose-tilesets:
    uses: ./.github/workflows/compose-tilesets.yml
  build-translations:
    uses: ./.github/workflows/build-translations.yml
    secrets:
      TX_TOKEN: ${{ secrets.TX_TOKEN }}

  builds:
    needs:
      - release
      - compose-tilesets
      - build-translations
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Tiles x64 MSVC
            artifact: windows-with-graphics-x64
            arch: x64
            os: windows-2022
            ext: zip
            content: application/zip
            tiles: 1
            sound: 0
          - name: Windows Tiles Sounds x64 MSVC
            artifact: windows-with-graphics-and-sounds-x64
            arch: x64
            os: windows-2022
            ext: zip
            content: application/zip
            tiles: 1
            sound: 1
          - name: Windows Tiles Sounds x64 MSVC (SDL3)
            artifact: windows-with-graphics-and-sounds-sdl3-x64
            arch: x64
            os: windows-2022
            ext: zip
            content: application/zip
            tiles: 1
            sound: 1
            sdl3: 1
          - name: Linux Tiles x64
            os: ubuntu-24.04
            android: none
            libbacktrace: 1
            tiles: 1
            sound: 0
            artifact: linux-with-graphics-x64
            ext: tar.gz
            content: application/gzip
          - name: Linux Tiles Sounds x64
            os: ubuntu-24.04
            android: none
            libbacktrace: 1
            tiles: 1
            sound: 1
            artifact: linux-with-graphics-and-sounds-x64
            ext: tar.gz
            content: application/gzip
          - name: Linux Tiles Sounds x64 (SDL3)
            os: ubuntu-24.04
            android: none
            libbacktrace: 1
            tiles: 1
            sound: 1
            sdl3: 1
            artifact: linux-with-graphics-and-sounds-sdl3-x64
            ext: tar.gz
            content: application/gzip
          - name: Linux Curses x64
            os: ubuntu-24.04
            android: none
            libbacktrace: 1
            tiles: 0
            sound: 0
            artifact: linux-terminal-only-x64
            ext: tar.gz
            content: application/gzip
          - name: macOS Curses Universal Binary (x64 and arm64)
            os: macos-15
            tiles: 0
            sound: 0
            artifact: osx-terminal-only-universal
            ext: dmg
            content: application/x-apple-diskimage
          - name: macOS Tiles Universal Binary (x64 and arm64)
            os: macos-15
            tiles: 1
            sound: 0
            artifact: osx-with-graphics-universal
            ext: dmg
            content: application/x-apple-diskimage
          - name: macOS Tiles Universal Binary (SDL3)
            os: macos-15
            tiles: 1
            sound: 0
            sdl3: 1
            artifact: osx-with-graphics-sdl3-universal
            ext: dmg
            content: application/x-apple-diskimage
          - name: Android x64
            os: ubuntu-latest
            tiles: 1
            android: arm64
            artifact: android-x64
            ext: apk
            content: application/apk
          - name: Android x32
            os: ubuntu-latest
            tiles: 1
            android: arm32
            artifact: android-x32
            ext: apk
            content: application/apk 
          #- name: WebAssembly Bundle
          #  os: ubuntu-latest
          #  artifact: wasm
          #  ext: zip
          #  content: application/zip
          #  tiles: 1
          #  sound: 0
          #  wasm: true
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions: write-all
    env:
        ZSTD_CLEVEL: 17
    steps:
      - name: Maximize build space (mac)
        if: ${{ runner.os == 'macos' && matrix.android == '' }}
        run: |
          sudo rm -rf $ANDROID_HOME
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-tags: true
          persist-credentials: false
      - name: Get soundpack
        if: matrix.sound == 1
        run: |
          git clone --depth=1 --shallow-submodules --recurse-submodules https://github.com/Fris0uman/CDDA-Soundpacks '${{ github.workspace }}/CDDA-Soundpacks'
          mv '${{ github.workspace }}/CDDA-Soundpacks/sound/CC-Sounds' '${{ github.workspace }}/data/sound'
      - name: Fetch tileset artifact into build
        if: matrix.tiles == 1
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: tileset-*
          path: gfx
          merge-multiple: true
      - name: Fetch translations artifact into build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: translations
      - name: Install dependencies (windows msvc) (1/4)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2
      - name: Install dependencies (windows msvc) (2/4)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        id: runvcpkg
        with:
          vcpkgDirectory: '${{ runner.workspace }}/b/vcpkg'
          vcpkgGitCommitId: 'c3867e714dd3a51c272826eea77267876517ed99'
      - name: Install dependencies (windows msvc) (3/4)
        if: runner.os == 'Windows'
        run: |
          vcpkg integrate install --vcpkg-root '${{ runner.workspace }}\b\vcpkg'
      - name: Install dependencies (windows msvc) (4/4)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda # v2
        with:
          msystem: mingw64
          install: >-
            gettext
            make
      - name: Cache vcpkg packages (Windows, SDL2)
        if: runner.os == 'Windows' && matrix.sdl3 != 1
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: msvc-full-features/vcpkg_installed
          key: vcpkg-installed-sdl2-${{ hashFiles('msvc-full-features/vcpkg.json', '.github/vcpkg_triplets/x64-windows-static.cmake') }}-c3867e714dd3a51c272826eea77267876517ed99
      - name: Cache vcpkg packages (Windows, SDL3)
        if: runner.os == 'Windows' && matrix.sdl3 == 1
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: msvc-full-features/vcpkg_installed
          key: vcpkg-installed-sdl3-${{ hashFiles('msvc-full-features/vcpkg.json', '.github/vcpkg_triplets/x64-windows-static.cmake') }}-c3867e714dd3a51c272826eea77267876517ed99
      - name: Install dependencies (Linux, SDL2)
        if: runner.os == 'Linux' && matrix.android == 'none' && !matrix.wasm && matrix.sdl3 != 1
        run: |
          sudo apt-get update
          sudo apt-get install libsdl2-dev
          git clone https://github.com/libsdl-org/SDL.git --branch release-2.0.20 --depth 1
          cd SDL
          mkdir build
          cd build
          ../configure
          make -j$((`nproc`+0))
          sudo make install
          cp ../LICENSE.txt ${{ github.workspace }}/LICENSE-SDL.txt
          sudo apt-get install libncursesw5-dev libsdl2-ttf-dev libsdl2-image-dev \
            libsdl2-mixer-dev libpulse-dev ccache gettext parallel
      - name: Install dependencies (Linux, SDL3)
        if: runner.os == 'Linux' && matrix.android == 'none' && !matrix.wasm && matrix.sdl3 == 1
        run: |
          sudo apt-get update
          sudo apt-get install libflac-dev libogg-dev libvorbis-dev libmpg123-dev libwavpack-dev \
              libfreetype-dev libharfbuzz-dev libjpeg-dev libpng-dev libwebp-dev libtiff-dev \
              libpulse-dev libncursesw5-dev ccache gettext parallel pkg-config cmake \
              libx11-dev libxext-dev libxcursor-dev libxi-dev libxfixes-dev libxrandr-dev \
              libxrender-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev \
              libdecor-0-dev libdrm-dev libgbm-dev libudev-dev libpipewire-0.3-dev \
              libdbus-1-dev libibus-1.0-dev
      - name: Cache SDL3 stack source build (Linux, SDL3)
        if: runner.os == 'Linux' && matrix.android == 'none' && !matrix.wasm && matrix.sdl3 == 1
        id: cache-sdl3-release
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.workspace }}/sdl3_prefix
          key: sdl3-stack-sdl-3.4.4-image-3.4.2-ttf-3.2.2-mixer-3.2.0-${{ runner.os }}-v2
      - name: Build SDL3 stack from source (Linux, SDL3)
        if: runner.os == 'Linux' && matrix.android == 'none' && !matrix.wasm && matrix.sdl3 == 1 && steps.cache-sdl3-release.outputs.cache-hit != 'true'
        run: |
          PREFIX=${{ runner.workspace }}/sdl3_prefix
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig:$PREFIX/lib/x86_64-linux-gnu/pkgconfig
          export CMAKE_PREFIX_PATH=$PREFIX
          git clone --depth 1 --branch release-3.4.4 https://github.com/libsdl-org/SDL.git sdl3_src
          cmake -S sdl3_src -B sdl3_build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_build -j$(nproc)
          cmake --install sdl3_build
          git clone --depth 1 --branch release-3.4.2 https://github.com/libsdl-org/SDL_image.git sdl3_image_src
          cmake -S sdl3_image_src -B sdl3_image_build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DSDLIMAGE_VENDORED=OFF \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_image_build -j$(nproc)
          cmake --install sdl3_image_build
          git clone --depth 1 --branch release-3.2.2 https://github.com/libsdl-org/SDL_ttf.git sdl3_ttf_src
          cmake -S sdl3_ttf_src -B sdl3_ttf_build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DSDLTTF_VENDORED=OFF \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_ttf_build -j$(nproc)
          cmake --install sdl3_ttf_build
          git clone --depth 1 --branch release-3.2.0 https://github.com/libsdl-org/SDL_mixer.git sdl3_mixer_src
          cmake -S sdl3_mixer_src -B sdl3_mixer_build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DSDLMIXER_VENDORED=OFF \
              -DSDLMIXER_FLAC=ON -DSDLMIXER_FLAC_LIBFLAC=ON \
              -DSDLMIXER_MP3=ON -DSDLMIXER_MP3_MPG123=ON \
              -DSDLMIXER_VORBIS=VORBISFILE \
              -DSDLMIXER_WAVPACK=ON \
              -DSDLMIXER_OPUS=OFF -DSDLMIXER_MOD=OFF -DSDLMIXER_MIDI=OFF \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_mixer_build -j$(nproc)
          cmake --install sdl3_mixer_build
          mkdir -p $PREFIX/share
          cp sdl3_src/LICENSE.txt $PREFIX/share/LICENSE-SDL.txt
          cp sdl3_mixer_src/LICENSE.txt $PREFIX/share/LICENSE-SDL3_mixer.txt
      - name: Stage SDL3 license files (Linux, SDL3)
        if: runner.os == 'Linux' && matrix.android == 'none' && !matrix.wasm && matrix.sdl3 == 1
        run: |
          cp ${{ runner.workspace }}/sdl3_prefix/share/LICENSE-SDL.txt ${{ github.workspace }}/LICENSE-SDL.txt
          cp ${{ runner.workspace }}/sdl3_prefix/share/LICENSE-SDL3_mixer.txt ${{ github.workspace }}/LICENSE-SDL3_mixer.txt
      - name: Install Emscripten (WebAssembly)
        if: matrix.wasm
        uses: mymindstorm/setup-emsdk@d233ac12b0102f74ca199f5dad7a4e2c13a8a745 # v13
      - name: Install runtime dependencies (mac, SDL2)
        if: runner.os == 'macOS' && matrix.sdl3 != 1
        uses: BrettDong/setup-sdl2-frameworks@a8ca795ef904417e9ddcb010ef6bf2d11779dbe3 # v2
        with:
          sdl2: 2.30.11
          sdl2-ttf: 2.24.0
          sdl2-image: 2.8.4
          sdl2-mixer: 2.8.0
      - name: Install build dependencies (mac)
        if: runner.os == 'macOS'
        run: |
          HOMEBREW_NO_AUTO_UPDATE=yes HOMEBREW_NO_INSTALL_CLEANUP=yes brew install gettext ccache parallel dylibbundler
          pip3 install --break-system-packages dmgbuild biplist
      - name: install macports (mac, SDL2)
        if: runner.os == 'macOS' && matrix.tiles == 1 && matrix.sdl3 != 1
        uses: melusina-org/setup-macports@c7eb59386def259a274627092566a7f7b8d219b1 # v1
      - name: install macports packages (mac, SDL2)
        if: runner.os == 'macOS' && matrix.tiles == 1 && matrix.sdl3 != 1
        run: |
          sudo port install freetype +universal pkgconfig +universal
      - name: install macports (mac, SDL3)
        if: runner.os == 'macOS' && matrix.tiles == 1 && matrix.sdl3 == 1
        uses: melusina-org/setup-macports@c7eb59386def259a274627092566a7f7b8d219b1 # v1
      - name: install macports packages (mac, SDL3)
        if: runner.os == 'macOS' && matrix.tiles == 1 && matrix.sdl3 == 1
        run: |
          sudo port install freetype +universal pkgconfig +universal
      - name: Cache SDL3 stack source build (mac, SDL3)
        if: runner.os == 'macOS' && matrix.tiles == 1 && matrix.sdl3 == 1
        id: cache-sdl3-release-macos
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.workspace }}/sdl3_prefix
          key: sdl3-stack-universal-sdl-3.4.4-image-3.4.2-ttf-3.2.2-mixer-3.2.0-${{ runner.os }}-v1
      - name: Build SDL3 stack from source (mac, SDL3, universal)
        if: runner.os == 'macOS' && matrix.tiles == 1 && matrix.sdl3 == 1 && steps.cache-sdl3-release-macos.outputs.cache-hit != 'true'
        run: |
          PREFIX=${{ runner.workspace }}/sdl3_prefix
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig:/opt/local/lib/pkgconfig
          export CMAKE_PREFIX_PATH=$PREFIX
          ARCH_ARG='-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64'
          git clone --depth 1 --branch release-3.4.4 https://github.com/libsdl-org/SDL.git sdl3_src
          cmake -S sdl3_src -B sdl3_build "$ARCH_ARG" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_build -j$(sysctl -n hw.ncpu)
          cmake --install sdl3_build
          git clone --depth 1 --branch release-3.4.2 --recurse-submodules --shallow-submodules https://github.com/libsdl-org/SDL_image.git sdl3_image_src
          cmake -S sdl3_image_src -B sdl3_image_build "$ARCH_ARG" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DSDLIMAGE_VENDORED=ON \
              -DSDLIMAGE_AVIF=OFF -DSDLIMAGE_JXL=OFF -DSDLIMAGE_WEBP=OFF \
              -DPNG_ARM_NEON=off \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_image_build -j$(sysctl -n hw.ncpu)
          cmake --install sdl3_image_build
          git clone --depth 1 --branch release-3.2.2 --recurse-submodules --shallow-submodules https://github.com/libsdl-org/SDL_ttf.git sdl3_ttf_src
          cmake -S sdl3_ttf_src -B sdl3_ttf_build "$ARCH_ARG" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DSDLTTF_VENDORED=ON \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_ttf_build -j$(sysctl -n hw.ncpu)
          cmake --install sdl3_ttf_build
          git clone --depth 1 --branch release-3.2.0 --recurse-submodules --shallow-submodules https://github.com/libsdl-org/SDL_mixer.git sdl3_mixer_src
          cmake -S sdl3_mixer_src -B sdl3_mixer_build "$ARCH_ARG" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DSDLMIXER_VENDORED=ON \
              -DSDLMIXER_OPUS=OFF -DSDLMIXER_MOD=OFF -DSDLMIXER_MIDI=OFF \
              -DBUILD_SHARED_LIBS=ON
          cmake --build sdl3_mixer_build -j$(sysctl -n hw.ncpu)
          cmake --install sdl3_mixer_build
          mkdir -p $PREFIX/share
          cp sdl3_src/LICENSE.txt $PREFIX/share/LICENSE-SDL.txt
          cp sdl3_mixer_src/LICENSE.txt $PREFIX/share/LICENSE-SDL3_mixer.txt
      - name: Stage SDL3 license files (mac, SDL3)
        if: runner.os == 'macOS' && matrix.tiles == 1 && matrix.sdl3 == 1
        run: |
          cp ${{ runner.workspace }}/sdl3_prefix/share/LICENSE-SDL.txt ${{ github.workspace }}/LICENSE-SDL.txt
          cp ${{ runner.workspace }}/sdl3_prefix/share/LICENSE-SDL3_mixer.txt ${{ github.workspace }}/LICENSE-SDL3_mixer.txt
      - name: Create VERSION.TXT
        shell: bash
        run: |
          cat >VERSION.txt <<EOL
          build type: ${{ matrix.artifact }}
          build number: ${NEEDS_RELEASE_OUTPUTS_TIMESTAMP}
          commit sha: ${{ github.sha }}
          commit url: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          EOL
        env:
          NEEDS_RELEASE_OUTPUTS_TIMESTAMP: ${{ needs.release.outputs.timestamp }}
      - name: Compile translations (windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          lang/compile_mo.sh all
      - name: Build libbacktrace
        if: matrix.libbacktrace == 1
        run: |
          git clone https://github.com/ianlancetaylor/libbacktrace.git
          cd libbacktrace
          git checkout 14818b7783eeb9a56c3f0fca78cefd3143f8c5f6
          ./configure
          make -j$((`nproc`+0))
          cp LICENSE ${{ github.workspace }}/LICENSE-libbacktrace.txt
          sudo make install
      - name: Build CDDA (linux)
        if: runner.os == 'Linux' && matrix.android == 'none' && !matrix.wasm
        run: |
          if [ "${{ matrix.sdl3 }}" = "1" ]; then
            export PKG_CONFIG_PATH="$RUNNER_WORKSPACE/sdl3_prefix/lib/pkgconfig:$RUNNER_WORKSPACE/sdl3_prefix/lib/x86_64-linux-gnu/pkgconfig"
            export LD_LIBRARY_PATH="$RUNNER_WORKSPACE/sdl3_prefix/lib:$RUNNER_WORKSPACE/sdl3_prefix/lib/x86_64-linux-gnu"
          fi
          make COMPILER=clang++-18 -j$((`nproc`+0)) TILES=${{ matrix.tiles }} SOUND=${{ matrix.tiles }} SDL3=${{ matrix.sdl3 == 1 && '1' || '0' }} RELEASE=1 LOCALIZE=1 LANGUAGES=all BACKTRACE=1 LIBBACKTRACE=${{ matrix.libbacktrace }} WARN_STALE_DATA=1 PCH=0 bindist
          mv cataclysmdda-0.J.tar.gz cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.tar.gz
      - name: Build CDDA (WebAssembly)
        if: matrix.wasm && success()
        run: |
          ./build-scripts/build-emscripten.sh
          ./build-scripts/prepare-web.sh
          (cd build && zip ../cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.${{ matrix.ext }} *)
      - name: Build CDDA (windows msvc, SDL2)
        if: runner.os == 'Windows' && matrix.sdl3 != 1
        env:
          # Enable pretty backtraces
          BACKTRACE: 1
          CDDA_RELEASE_BUILD: 1
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}\.github\vcpkg_triplets
        run: |
          msbuild -m -p:Configuration=Release -p:Platform=${{ matrix.arch }} "-target:Cataclysm-vcpkg-static;JsonFormatter-vcpkg-static;zzip" msvc-full-features\Cataclysm-vcpkg-static.sln
          .\build-scripts\windist.ps1
          mv cataclysmdda-0.J.zip cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.zip
      - name: Build CDDA (windows msvc, SDL3)
        if: runner.os == 'Windows' && matrix.sdl3 == 1
        env:
          BACKTRACE: 1
          CDDA_RELEASE_BUILD: 1
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}\.github\vcpkg_triplets
        run: |
          msbuild -m -p:Configuration=Release -p:Platform=${{ matrix.arch }} -p:UseSDL3=true "-target:Cataclysm-vcpkg-static;JsonFormatter-vcpkg-static;zzip" msvc-full-features\Cataclysm-vcpkg-static.sln
          .\build-scripts\windist.ps1
          mv cataclysmdda-0.J.zip cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.zip
      - name: Build CDDA (osx, SDL2)
        if: runner.os == 'macOS' && matrix.sdl3 != 1
        run: |
          make -j3 TILES=${{ matrix.tiles }} SOUND=${{ matrix.tiles }} RELEASE=1 LOCALIZE=1 LANGUAGES=all BACKTRACE=0 PCH=0 USE_HOME_DIR=1 FRAMEWORK=1 UNIVERSAL_BINARY=1 WARN_STALE_DATA=1 dmgdist
          mv Cataclysm.dmg cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.dmg
      - name: Build CDDA (osx, SDL3)
        if: runner.os == 'macOS' && matrix.sdl3 == 1
        env:
          PKG_CONFIG_PATH: ${{ runner.workspace }}/sdl3_prefix/lib/pkgconfig:/opt/local/lib/pkgconfig
          DYLIBBUNDLER_SEARCH_PATHS: ${{ runner.workspace }}/sdl3_prefix/lib
        run: |
          make -j3 TILES=${{ matrix.tiles }} SOUND=${{ matrix.tiles }} SDL3=1 RELEASE=1 LOCALIZE=1 LANGUAGES=all BACKTRACE=0 PCH=0 USE_HOME_DIR=1 UNIVERSAL_BINARY=1 WARN_STALE_DATA=1 dmgdist
          mv Cataclysm.dmg cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.dmg
      - name: Set up JDK (android)
        if: runner.os == 'Linux' && matrix.android != 'none'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '11'
          distribution: 'adopt'   
      - name: Setup Build and Dependencies (android)
        if: runner.os == 'Linux' && matrix.android != 'none'
        run: |
          sudo apt-get update
          sudo apt-get install gettext          
      - name: Build CDDA (android)
        if: runner.os == 'Linux' && matrix.android != 'none'
        working-directory: ./android
        run: |
          echo "${{ secrets.KEYSTORE }}" > release.keystore.asc   
          gpg -d --passphrase "${{ secrets.KEYSTORE_PASSWORD }}" --batch release.keystore.asc > app/release.keystore 
          echo "${{ secrets.KEYSTORE_PROPERTIES }}" > keystore.properties.asc   
          gpg -d --passphrase "${{ secrets.KEYSTORE_PASSWORD }}" --batch keystore.properties.asc > keystore.properties
          export UPSTREAM_BUILD_NUMBER="$((11581 + ${{ github.run_number }}))"
          chmod +x gradlew
          if [ ${{ matrix.android }} = arm64 ]
          then
               ./gradlew -Pj=$((`nproc`+0)) -Pabi_arm_32=false assembleExperimentalRelease
               mv ./app/build/outputs/apk/experimental/release/*.apk ../cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.apk
          elif [ ${{ matrix.android }} = arm32 ]
          then
               ./gradlew -Pj=$((`nproc`+0)) -Pabi_arm_64=false assembleExperimentalRelease
               mv ./app/build/outputs/apk/experimental/release/*.apk ../cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.apk 
          fi
      - run: |
          gh release upload cdda-experimental-${{ needs.release.outputs.timestamp }} cdda-${{ matrix.artifact }}-${{ needs.release.outputs.timestamp }}.${{ matrix.ext }}
